        <div class="progress-meta" id="progressMeta"></div>

const LANG_NAMES = {
  ru: 'Русский',
  uz_cyr: 'Ўзбекча (Кирилл)',
  uz_lat: 'Oʻzbekcha (Lotin)',
};

const IDENTITY_KEYS = new Set(['company_name', 'contact_name', 'position', 'phone']);

const state = {
  lang: null,
  questions: [],
  cursor: 'intro',  // 'intro' | 'thanks' | question-key
  identity: { company_name: '', contact_name: '', position: '', phone: '' },
  answers: {},
  /** first-time draft resume was prompted */
  resumePrompted: false,
};

// ============ INIT ============
async function init() {
  try {
    // Restore lang
    const savedLang = safeGet(LANG_KEY);
    state.lang = savedLang && UI[savedLang] ? savedLang : null;

    // Fetch questions
    const r = await fetch('/api/survey/questions');
    const data = await r.json();
    state.questions = (data.questions || []).sort(
      (a, b) => a.step_number - b.step_number || a.position - b.position || a.id - b.id
    );

    // Try to load v11, else migrate from v10 once
    const raw = safeGet(STORAGE_KEY) || (function () {
      for (const k of LEGACY_KEYS) {
        const v = safeGet(k);
        if (v) return v;
      }
      return null;
    })();
    if (raw) {
      try {
        const d = JSON.parse(raw);
        if (d.identity) state.identity = { ...state.identity, ...d.identity };
        if (d.answers) state.answers = d.answers;
        if (d.cursor) state.cursor = d.cursor;
      } catch (_) {}
    }

    // Guard: phone default prefix
    if (state.identity.phone === '' || state.identity.phone == null) {
      state.identity.phone = '+998 ';
    }

    render();
  } catch (e) {
    document.getElementById('screen').innerHTML =
      '<p class="subtitle">Не удалось загрузить опросник. Обновите страницу.</p>';
  }
}

// ============ DRAFT (debounced 500ms, localStorage → sessionStorage fallback) ============
let saveTimer = null;
function saveDraft() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const payload = JSON.stringify({
      identity: state.identity,
      answers: state.answers,
      cursor: state.cursor,
    });
    safeSet(STORAGE_KEY, payload);
    if (state.lang) safeSet(LANG_KEY, state.lang);
  }, 500);
}
function clearDraft() {
  safeRemove(STORAGE_KEY);
  for (const k of LEGACY_KEYS) safeRemove(k);
}
function safeGet(k) {
  try { return localStorage.getItem(k) || sessionStorage.getItem(k); } catch (_) { return null; }
}
function safeSet(k, v) {
  try { localStorage.setItem(k, v); } catch (_) {
    try { sessionStorage.setItem(k, v); } catch (__) {}
  }
}
function safeRemove(k) {
  try { localStorage.removeItem(k); } catch (_) {}
  try { sessionStorage.removeItem(k); } catch (_) {}
}

// ============ i18n ============
function t(x) {
  if (x == null) return '';
  if (typeof x === 'string') return x;
  return x[state.lang] || x.ru || Object.values(x)[0] || '';
}
function optionsOf(q) {
  const c = q.config || {};
  const key = 'options_' + state.lang;
  const arr = c[key] || c.options_ru || c.options || [];
  return { localized: arr, canonical: c.options_ru || c.options || arr };
}

// ============ BRANCHING / VISIBILITY ============
function isQuestionVisible(q) {
  if (!q.show_if) return true;
  return evalShowIf(q.show_if);
}
function evalShowIf(rule) {
  const trigger = answerFor(rule.question_key);
  const op = rule.op || 'in';
  if (trigger === undefined || trigger === null || trigger === '') return false;
  if (op === 'in') {
    const arr = rule.values || [];
    if (Array.isArray(trigger)) return trigger.some((x) => arr.includes(x));
    return arr.includes(trigger);
  }
  if (op === 'eq') return trigger === rule.value;
  const n = Number(trigger);
  if (!Number.isFinite(n)) return false;
  if (op === 'lte') return n <= Number(rule.value);
  if (op === 'gte') return n >= Number(rule.value);
  if (op === 'lt')  return n < Number(rule.value);
  if (op === 'gt')  return n > Number(rule.value);
  return false;
}
function answerFor(key) {
  if (IDENTITY_KEYS.has(key)) return state.identity[key];
  return state.answers[key];
}
function visibleQuestions() {
  return state.questions.filter(isQuestionVisible);
}

// ============ NAVIGATION ============
function currentQuestion() {
  const list = visibleQuestions();
  return list.find((q) => q.key === state.cursor) || null;
}

function isCurrentScreenValid() {
  if (state.cursor === 'intro' || state.cursor === 'thanks') return true;
  const q = currentQuestion();
  if (!q) return false;
  if (q.required) {
    const val = answerFor(q.key);
    const empty = val === undefined || val === null || val === '' ||
                  (Array.isArray(val) && val.length === 0);
    if (empty) return false;
    if (q.key === 'phone' && !isPhoneValid(String(val))) return false;
    if (q.key === 'company_name' && String(val).trim().length < 3) return false;
    if (q.key === 'contact_name' && String(val).trim().split(/\s+/).filter(Boolean).length < 2) return false;
    if (q.type === 'long_text' && q.config && q.config.min_length) {
      if (String(val).trim().length < q.config.min_length) return false;
    }
  }
  if (q.type === 'checkbox' && q.config && q.config.allow_other) {
    const arr = Array.isArray(state.answers[q.key]) ? state.answers[q.key] : [];
    const canonical = (q.config.options_ru || q.config.options || []);
    const otherVal = arr.find((v) => !canonical.includes(v));
    const minL = q.config.other_min_length || 2;
    if (otherVal !== undefined && String(otherVal).trim().length < minL) return false;
  }
  return true;
}
function refreshNextBtn() {
  const btn = document.getElementById('nextBtn');
  if (btn) btn.disabled = !isCurrentScreenValid();
}

function goNext() {
  const ui = UI[state.lang] || UI.ru;
  if (state.cursor === 'intro') {
    if (!state.lang) { showError(ui.selectLangHeading || 'Select language'); return; }
    const list = visibleQuestions();
    state.cursor = list.length ? list[0].key : 'thanks';
    saveDraft(); render({ scrollTop: true });
    return;
  }
  if (state.cursor === 'thanks') return;
  const q = currentQuestion();
  if (!q) return;
  if (!isCurrentScreenValid()) {
    let msg = ui.fillRequired;
    const val = answerFor(q.key);
    if (q.key === 'phone' && !isPhoneValid(String(val))) msg = ui.invalidPhone;
    else if (q.key === 'company_name' && (!val || String(val).trim().length < 3)) msg = ui.shortCompany;
    else if (q.key === 'contact_name' && (!val || String(val).trim().split(/\s+/).filter(Boolean).length < 2)) msg = ui.shortName;
    return showError(msg);
  }
  const list = visibleQuestions();
  const i = list.findIndex((x) => x.key === q.key);
  if (i < 0 || i === list.length - 1) { submit(); return; }
  state.cursor = list[i + 1].key;
  saveDraft(); render({ scrollTop: true });
}

function goBack() {
  if (state.cursor === 'intro') return;
  if (state.cursor === 'thanks') {
    state.cursor = 'intro';
    saveDraft(); render({ scrollTop: true });
    return;
  }
  const list = visibleQuestions();
  const i = list.findIndex((x) => x.key === state.cursor);
  if (i <= 0) { state.cursor = 'intro'; saveDraft(); render({ scrollTop: true }); return; }
  state.cursor = list[i - 1].key;
  saveDraft(); render({ scrollTop: true });
}

// ============ RENDER ============
function render(opts = {}) {
  const ui = state.lang ? UI[state.lang] : UI.ru;
  const screen = document.getElementById('screen');
  const actionBar = document.getElementById('actionBar');
  const progressTop = document.getElementById('progressTop');

  document.getElementById('message').textContent = '';
  document.getElementById('message').className = 'msg';

  // Sidebar always rendered
  renderSidebar();

  const onQuestion = state.cursor !== 'intro' && state.cursor !== 'thanks';

  // Progress bar (top of main)
  if (onQuestion) {
    const list = visibleQuestions();
    const idx = list.findIndex((q) => q.key === state.cursor);
    if (idx < 0) {
      // cursor got lost — bail to first visible
      state.cursor = list.length ? list[0].key : 'thanks';
      return render({ scrollTop: true });
    }
    // Counter shows stable max (no shrinking). Progress % by visible position.
    const pct = Math.round(((idx + 1) / list.length) * 100);
    progressTop.hidden = false;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressMeta').textContent =
      ui.questionOf(idx + 1, Math.max(MAX_QUESTIONS, list.length)) + ' · ' + pct + '%';
  } else {
    progressTop.hidden = true;
  }

  // Action bar — hidden on thanks, back hidden on intro & very first question
  const isThanks = state.cursor === 'thanks';
  actionBar.hidden = isThanks;
  const backBtn = document.getElementById('backBtn');
  const nextBtn = document.getElementById('nextBtn');
  const list = visibleQuestions();
  const firstKey = list.length ? list[0].key : null;
  const hideBack = state.cursor === 'intro' || state.cursor === firstKey;
  backBtn.style.display = hideBack ? 'none' : '';
  backBtn.textContent = ui.back;
  nextBtn.disabled = !isCurrentScreenValid();
  nextBtn.textContent = (onQuestion && list[list.findIndex((q)=>q.key===state.cursor)] && list.findIndex((q)=>q.key===state.cursor) === list.length - 1)
    ? ui.submit
    : (state.cursor === 'intro' ? ui.start : ui.next);

  // Content
  if (state.cursor === 'intro') screen.innerHTML = renderIntro();
  else if (isThanks) screen.innerHTML = renderThanks();
  else screen.innerHTML = renderQuestion(currentQuestion());

  bindEvents();

  if (opts.scrollTop !== false) {
    // Scroll the main scroll container
    document.querySelector('.survey-main')?.scrollTo({ top: 0, behavior: 'smooth' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function renderSidebar() {
  const ui = state.lang ? UI[state.lang] : UI.ru;

  // Lang tabs: mark active
  document.querySelectorAll('.lang-tab').forEach((b) => {
    const lang = b.dataset.langSw;
    const active = lang === state.lang;
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', active ? 'true' : 'false');
  });

  // Context block (current step info)
  const ctx = document.getElementById('sideContext');
  const totalSteps = 6;
  if (state.cursor === 'intro' || !state.lang) {
    ctx.innerHTML = `
      <div class="side-caps">${escapeHtml(state.lang ? ui.stepOf(0, totalSteps).replace('0', '—') : '')}</div>
      <h1 class="side-title">${escapeHtml(ui.selectLangHeading || '')}</h1>
      <p class="side-desc">${escapeHtml(ui.selectLangBody || '')}</p>`;
  } else if (state.cursor === 'thanks') {
    ctx.innerHTML = `
      <div class="side-caps">✓</div>
      <h1 class="side-title">${escapeHtml(ui.thanks)}</h1>
      <p class="side-desc">${escapeHtml(ui.scheduleNote || '')}</p>`;
  } else {
    const q = currentQuestion();
    if (q) {
      ctx.innerHTML = `
        <div class="side-caps">${escapeHtml(ui.stepOf(q.step_number, totalSteps))}</div>
        <h1 class="side-title">${escapeHtml(t(q.step_title))}</h1>
        <p class="side-desc">${escapeHtml(q.step_help ? t(q.step_help) : '')}</p>`;
    }
  }

  // Step list: 6 steps with checkmarks
  const sideSteps = document.getElementById('sideSteps');
  // Group questions by step_number for titles
  const stepMeta = new Map();
  for (const q of state.questions) {
    if (!stepMeta.has(q.step_number)) stepMeta.set(q.step_number, q.step_title);
  }
  const cur = currentQuestion();
  const curStep = cur ? cur.step_number : (state.cursor === 'thanks' ? totalSteps + 1 : 0);
  const items = [];
  for (let i = 1; i <= totalSteps; i++) {
    const title = stepMeta.get(i) ? t(stepMeta.get(i)) : '';
    const cls = i < curStep ? 'done' : (i === curStep ? 'current' : 'future');
    const mark = i < curStep ? '✓' : (i === curStep ? '●' : '');
    items.push(`<li class="step-li ${cls}"><span class="step-mark">${mark}</span><span class="step-label">${i}. ${escapeHtml(title)}</span></li>`);
  }
  sideSteps.innerHTML = `<ol>${items.join('')}</ol>`;
}

function renderIntro() {
  const ui = state.lang ? UI[state.lang] : UI.ru;
  if (!state.lang) {
    // Need language first — repeat CTA
    return `
      <h1 class="q-head">${escapeHtml(UI.ru.selectLangHeading)} · ${escapeHtml(UI.uz_cyr.selectLangHeading)} · ${escapeHtml(UI.uz_lat.selectLangHeading)}</h1>
      <p class="q-body-text">${escapeHtml(UI.ru.selectLangBody)}</p>
      <p class="q-body-text muted-text">${escapeHtml(UI.uz_cyr.selectLangBody)}</p>
      <p class="q-body-text muted-text">${escapeHtml(UI.uz_lat.selectLangBody)}</p>
      <p class="q-hint">← ${escapeHtml(UI.ru.selectLangHeading)}</p>`;
  }
  return `
    <h1 class="q-head">${escapeHtml(ui.surveyTitle)}</h1>
    <p class="q-body-text">${escapeHtml(ui.intro)}</p>
    <p class="q-body-text">${escapeHtml(ui.introNote)}</p>`;
}

function renderThanks() {
  const ui = UI[state.lang] || UI.ru;
  return `
    <div class="thanks-block">
      <div class="thanks-check">✓</div>
      <h1 class="q-head">${escapeHtml(ui.thanks)}</h1>
      <p class="q-body-text">${escapeHtml(ui.thanksBody)}</p>
      <div class="thanks-actions">
        <a class="btn-next" href="https://verifix.uz" target="_blank" rel="noopener">${escapeHtml(ui.goHome)}</a>
        <button type="button" class="btn-back" id="restartBtn">${escapeHtml(ui.restart)}</button>
      </div>
    </div>`;
}

function renderQuestion(q) {
  if (!q) return '';
  const ui = UI[state.lang] || UI.ru;
  const val = answerFor(q.key);
  const title = escapeHtml(t(q.title));
  const required = q.required ? ' <span class="req">*</span>' : '';
  const helpText = q.help_text ? `<p class="q-hint">${escapeHtml(t(q.help_text))}</p>` : '';
  let body = '';

  const isIdentity = IDENTITY_KEYS.has(q.key);

  if (isIdentity && q.key === 'phone') {
    let stored = state.identity.phone || '+998 ';
    if (!stored.startsWith('+998')) stored = '+998 ' + stored.replace(/\D/g, '');
    state.identity.phone = stored;
    const digitsPart = stored.replace(/^\+998\s*/, '');
    body = `
      <div class="phone-group">
        <span class="phone-prefix">+998</span>
        <input type="tel" inputmode="numeric" class="text-input phone-suffix" data-identity-phone maxlength="20" value="${escapeAttr(digitsPart)}" placeholder="90 123 45 67" autocomplete="tel-national" />
      </div>`;
  } else if (isIdentity && q.type === 'select') {
    body = renderSelect(q, state.identity[q.key] || '', 'data-identity-select');
  } else if (isIdentity) {
    const v = escapeAttr(state.identity[q.key] || '');
    const ph = q.key === 'company_name' ? ui.companyPlaceholder : ui.inputPlaceholder;
    body = `<input type="text" class="text-input" data-identity="${q.key}" maxlength="200" value="${v}" placeholder="${escapeAttr(ph)}" />`;
  } else if (q.type === 'short_text') {
    const customPh = q.config && q.config.placeholder ? t(q.config.placeholder) : ui.inputPlaceholder;
    body = `<input type="text" class="text-input" data-qkey="${q.key}" maxlength="500" value="${escapeAttr(val || '')}" placeholder="${escapeAttr(customPh)}" />`;
  } else if (q.type === 'long_text') {
    const customPh = q.config && q.config.placeholder ? t(q.config.placeholder) : ui.inputPlaceholder;
    const maxLen = (q.config && q.config.max_length) || 3000;
    body = `<textarea class="text-input" data-qkey="${q.key}" rows="5" maxlength="${maxLen}" placeholder="${escapeAttr(customPh)}">${escapeHtml(val || '')}</textarea>`;
  } else if (q.type === 'select') {
    body = renderSelect(q, val || '', 'data-qkey');
  } else if (q.type === 'radio') {
    const { localized, canonical } = optionsOf(q);
    const allowOther = q.config && q.config.allow_other;
    const isOther = allowOther && val && !canonical.includes(val) && val !== '';
    if (isOther) {
      body = `
        <div class="options options-other-focus">
          <label class="opt opt-other-selected">
            <input type="radio" name="${q.key}" value="__other__" data-qkey="${q.key}" checked />
            <span>${escapeHtml(ui.otherLabel)}</span>
          </label>
          <textarea class="text-input" data-qkey-other="${q.key}" maxlength="500" rows="3" placeholder="${escapeAttr(ui.otherPlaceholder)}">${escapeHtml(val)}</textarea>
          <button type="button" class="btn-back opt-other-back" data-other-back="${q.key}">← ${escapeHtml(ui.back)}</button>
        </div>`;
    } else {
      body = '<div class="options">' + localized.map((label, i) => {
        const cv = canonical[i];
        const checked = val === cv ? 'checked' : '';
        return `<label class="opt"><input type="radio" name="${q.key}" value="${escapeAttr(cv)}" data-qkey="${q.key}" ${checked} /><span>${escapeHtml(label)}</span></label>`;
      }).join('');
      if (allowOther) {
        body += `<label class="opt"><input type="radio" name="${q.key}" value="__other__" data-qkey="${q.key}" /><span>${escapeHtml(ui.otherLabel)}…</span></label>`;
      }
      body += '</div>';
    }
  } else if (q.type === 'checkbox') {
    const { localized, canonical } = optionsOf(q);
    const arr = Array.isArray(val) ? val : [];
    const allowOther = q.config && q.config.allow_other;
    const otherValue = allowOther ? (arr.find((v) => !canonical.includes(v)) || '') : '';
    const otherActive = !!otherValue;
    if (otherActive) {
      const customPh = (q.config && q.config.other_placeholder)
        ? t(q.config.other_placeholder) : ui.otherPlaceholder;
      body = `
        <div class="options options-other-focus">
          <label class="opt opt-other-selected">
            <input type="checkbox" data-qkey-multi-other="${q.key}" checked />
            <span>${escapeHtml(ui.otherLabel)}</span>
          </label>
          <textarea class="text-input" data-qkey-other="${q.key}" maxlength="500" rows="3" placeholder="${escapeAttr(customPh)}">${escapeHtml(otherValue)}</textarea>
          <button type="button" class="btn-back opt-other-back" data-other-back="${q.key}">← ${escapeHtml(ui.back)}</button>
        </div>`;
    } else {
      body = '<div class="options">' + localized.map((label, i) => {
        const cv = canonical[i];
        const checked = arr.includes(cv) ? 'checked' : '';
        return `<label class="opt"><input type="checkbox" value="${escapeAttr(cv)}" data-qkey-multi="${q.key}" ${checked} /><span>${escapeHtml(label)}</span></label>`;
      }).join('');
      if (allowOther) {
        body += `<label class="opt"><input type="checkbox" data-qkey-multi-other="${q.key}" /><span>${escapeHtml(ui.otherLabel)}…</span></label>`;
      }
      body += '</div>';
    }
  } else if (q.type === 'scale') {
    body = renderScale(q, val);
  }

  return `
    <h2 class="q-head">${title}${required}</h2>
    ${helpText}
    <div class="q-body">${body}</div>
  `;
}

function renderScale(q, val) {
  const ui = UI[state.lang] || UI.ru;
  const c = q.config || {};
  const min = c.min ?? 1, max = c.max ?? 5;
  const count = max - min + 1;
  const low = c.low_label ? t(c.low_label) : '';
  const high = c.high_label ? t(c.high_label) : '';
  const leftEmoji = (c.anchors && c.anchors.left_emoji) || '😕';
  const rightEmoji = (c.anchors && c.anchors.right_emoji) || '😍';
  const isNps = min === 0 && max === 10 && count === 11;

  const zoneClass = (i) => {
    if (isNps) return i <= 6 ? 'nps-det' : (i <= 8 ? 'nps-neu' : 'nps-pro');
    return i <= 2 ? 'nps-det' : (i === 3 ? 'nps-neu' : 'nps-pro');
  };
  const ZONE_COLOR = { 'nps-det': '#E24B4A', 'nps-neu': '#EF9F27', 'nps-pro': '#97C459' };

  let tiles = '';
  for (let i = min; i <= max; i++) {
    const checked = String(val) === String(i);
    // Per spec: use div role=button to avoid WebKit implicit min-width
    tiles += `<div class="nps-cell ${zoneClass(i)}${checked ? ' selected' : ''}" role="radio" aria-checked="${checked}" aria-label="${i}" tabindex="${checked || (val === undefined && i === min) ? '0' : '-1'}" data-nps-key="${q.key}" data-nps-val="${i}">${i}</div>`;
  }

  const selectedVal = (val !== undefined && val !== '' && !isNaN(Number(val))) ? Number(val) : null;
  const confirmRow = selectedVal !== null
    ? `<div class="rating-confirm">
         <span class="rating-confirm-label">${escapeHtml(ui.yourRating)}</span>
         <span class="rating-confirm-value" style="color:${ZONE_COLOR[zoneClass(selectedVal)]}">${selectedVal}</span>
       </div>`
    : '';

  const scaleCls = isNps ? 'nps-scale nps-scale-11' : 'nps-scale nps-scale-' + count;
  const cssCols = `repeat(${count}, minmax(0, 1fr))`;

  return `
    <div class="scale-wrap">
      <div class="scale-anchors">
        <div class="scale-anchor-left"><span class="scale-emo">${leftEmoji}</span><span>${escapeHtml(low)}</span></div>
        <div class="scale-anchor-right"><span>${escapeHtml(high)}</span><span class="scale-emo">${rightEmoji}</span></div>
      </div>
      <div class="${scaleCls}" role="radiogroup" aria-label="${escapeAttr(t(q.title))}" style="--cols: ${cssCols}">
        ${tiles}
      </div>
      ${confirmRow}
    </div>`;
}

function renderSelect(q, currentVal, attrName) {
  const ui = UI[state.lang] || UI.ru;
  const { localized, canonical } = optionsOf(q);
  const allowOther = q.config && q.config.allow_other;
  const isOther = currentVal && !canonical.includes(currentVal);
  const selectedCanonical = isOther ? '__other__' : (currentVal || '');
  const hasValue = !!selectedCanonical;
  let options = `<option value="">${escapeHtml(ui.selectPlaceholder)}</option>`;
  localized.forEach((label, i) => {
    const cv = canonical[i];
    const sel = cv === selectedCanonical ? 'selected' : '';
    options += `<option value="${escapeAttr(cv)}" ${sel}>${escapeHtml(label)}</option>`;
  });
  if (allowOther) {
    options += `<option value="__other__" ${isOther ? 'selected' : ''}>${escapeHtml(ui.otherLabel)}…</option>`;
  }
  const cls = `text-input select-input${hasValue ? ' has-value' : ''}`;
  let out = `<select class="${cls}" ${attrName}="${q.key}">${options}</select>`;
  // Per spec: Other field ONLY shown when __other__ selected
  if (allowOther && isOther) {
    const otherAttr = attrName === 'data-identity-select' ? 'data-identity-other' : 'data-qkey-other';
    out += `<input type="text" class="text-input inline-other-under" ${otherAttr}="${q.key}" maxlength="200" value="${escapeAttr(isOther ? currentVal : '')}" placeholder="${escapeAttr(ui.otherPlaceholder)}" />`;
  }
  return out;
}

// ============ EVENTS ============
function bindEvents() {
  // Lang tabs (always in sidebar)
  document.querySelectorAll('.lang-tab').forEach((btn) => {
    btn.onclick = () => {
      const lang = btn.dataset.langSw;
      if (!UI[lang]) return;
      state.lang = lang;
      document.documentElement.lang = lang === 'ru' ? 'ru' : (lang === 'uz_cyr' ? 'uz-Cyrl' : 'uz-Latn');
      saveDraft();
      render({ scrollTop: false });
    };
  });

  // Identity inputs
  document.querySelectorAll('[data-identity]').forEach((el) => {
    const k = el.dataset.identity;
    el.addEventListener('input', () => {
      state.identity[k] = el.value; saveDraft(); refreshNextBtn();
    });
    el.addEventListener('focus', () => scrollIntoViewMobile(el));
    if (el.tagName === 'INPUT') {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); goNext(); }
      });
    }
  });
  // Phone suffix with light masking
  document.querySelectorAll('[data-identity-phone]').forEach((el) => {
    el.addEventListener('input', () => {
      // Auto-format: strip non-digits, group as "90 123 45 67"
      const digits = el.value.replace(/\D/g, '').slice(0, 9);
      const parts = [
        digits.slice(0, 2),
        digits.slice(2, 5),
        digits.slice(5, 7),
        digits.slice(7, 9),
      ].filter(Boolean);
      const formatted = parts.join(' ');
      if (el.value !== formatted) el.value = formatted;
      state.identity.phone = '+998 ' + formatted;
      saveDraft(); refreshNextBtn();
    });
    el.addEventListener('focus', () => scrollIntoViewMobile(el));
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); goNext(); }
    });
  });
  document.querySelectorAll('[data-identity-select]').forEach((el) => {
    const k = el.dataset.identitySelect;
    el.addEventListener('change', () => {
      const other = document.querySelector(`[data-identity-other="${k}"]`);
      if (el.value === '__other__') {
        state.identity[k] = other ? other.value : '';
      } else {
        state.identity[k] = el.value;
      }
      saveDraft();
      el.classList.toggle('has-value', !!el.value);
      refreshNextBtn();
      render({ scrollTop: false });
    });
  });
  document.querySelectorAll('[data-identity-other]').forEach((el) => {
    const k = el.dataset.identityOther;
    el.addEventListener('input', () => {
      state.identity[k] = el.value; saveDraft(); refreshNextBtn();
    });
    el.addEventListener('focus', () => scrollIntoViewMobile(el));
  });

  // Generic answer inputs
  document.querySelectorAll('[data-qkey]').forEach((el) => {
    const key = el.dataset.qkey;
    if (el.type === 'radio') {
      el.addEventListener('change', () => {
        if (!el.checked) return;
        if (el.value === '__other__') {
          const otherInput = document.querySelector(`[data-qkey-other="${key}"]`);
          const existing = otherInput ? otherInput.value : '';
          state.answers[key] = existing || ' ';
          saveDraft();
          render({ scrollTop: false });
          return;
        }
        const num = Number(el.value);
        state.answers[key] = Number.isFinite(num) && el.name === key && /^-?\d+$/.test(el.value) ? num : el.value;
        saveDraft();
        refreshNextBtn();
        if (dependentExists(key)) render({ scrollTop: false });
      });
    } else if (el.tagName === 'SELECT') {
      el.addEventListener('change', () => {
        state.answers[key] = el.value;
        saveDraft();
        el.classList.toggle('has-value', !!el.value);
        refreshNextBtn();
        render({ scrollTop: false });
      });
    } else if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.addEventListener('input', () => {
        state.answers[key] = el.value; saveDraft(); refreshNextBtn();
      });
      el.addEventListener('focus', () => scrollIntoViewMobile(el));
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && el.tagName === 'INPUT') { e.preventDefault(); goNext(); }
      });
    }
  });

  // Other text input (for checkbox / radio)
  document.querySelectorAll('[data-qkey-other]').forEach((el) => {
    const key = el.dataset.qkeyOther;
    el.addEventListener('input', () => {
      const q = state.questions.find((x) => x.key === key);
      const isCheckbox = q && q.type === 'checkbox';
      if (isCheckbox) {
        const canonical = (q.config && (q.config.options_ru || q.config.options)) || [];
        const current = Array.isArray(state.answers[key]) ? state.answers[key] : [];
        const kept = current.filter((v) => canonical.includes(v));
        kept.push(el.value.trim() || ' ');
        state.answers[key] = kept;
      } else {
        state.answers[key] = el.value;
      }
      saveDraft();
      refreshNextBtn();
    });
    el.addEventListener('focus', () => scrollIntoViewMobile(el));
  });

  document.querySelectorAll('[data-qkey-multi]').forEach((el) => {
    el.addEventListener('change', () => {
      const key = el.dataset.qkeyMulti;
      rebuildMultiAnswer(key);
      saveDraft();
      refreshNextBtn();
    });
  });
  document.querySelectorAll('[data-qkey-multi-other]').forEach((el) => {
    const key = el.dataset.qkeyMultiOther;
    el.addEventListener('change', () => {
      if (el.checked) {
        const curr = state.answers[key];
        const arr = Array.isArray(curr) ? curr.slice() : [];
        arr.push(' ');
        state.answers[key] = arr;
        saveDraft();
        render({ scrollTop: false });
      } else {
        rebuildMultiAnswer(key);
        saveDraft();
      }
    });
  });
  document.querySelectorAll('[data-other-back]').forEach((el) => {
    const key = el.dataset.otherBack;
    el.addEventListener('click', () => {
      const q = state.questions.find((x) => x.key === key);
      if (!q) return;
      const canonical = (q.config && (q.config.options_ru || q.config.options)) || [];
      if (q.type === 'checkbox') {
        const arr = Array.isArray(state.answers[key]) ? state.answers[key].filter((v) => canonical.includes(v)) : [];
        state.answers[key] = arr;
      } else {
        state.answers[key] = '';
      }
      saveDraft();
      render({ scrollTop: false });
    });
  });

  // NPS / rating tiles
  document.querySelectorAll('.nps-cell').forEach((btn) => {
    const key = btn.dataset.npsKey;
    const val = Number(btn.dataset.npsVal);
    btn.addEventListener('click', () => {
      if (state.answers[key] === val) return;
      state.answers[key] = val;
      saveDraft();
      if (navigator.vibrate) { try { navigator.vibrate(10); } catch (e) {} }
      render({ scrollTop: false });
    });
    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); return; }
      let next = null;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = val + 1;
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = val - 1;
      else if (e.key === 'Home') next = 0;
      else if (e.key === 'End')  next = 10;
      if (next !== null) {
        e.preventDefault();
        const target = document.querySelector(`.nps-cell[data-nps-key="${key}"][data-nps-val="${next}"]`);
        if (target) target.focus();
      }
    });
  });

  // Restart on thanks
  const restart = document.getElementById('restartBtn');
  if (restart) restart.onclick = () => {
    clearDraft();
    state.identity = { company_name: '', contact_name: '', position: '', phone: '+998 ' };
    state.answers = {};
    state.cursor = 'intro';
    saveDraft();
    render({ scrollTop: true });
  };

  document.getElementById('backBtn').onclick = goBack;
  document.getElementById('nextBtn').onclick = goNext;
}

function dependentExists(triggerKey) {
  return state.questions.some((q) => q.show_if && q.show_if.question_key === triggerKey);
}

function rebuildMultiAnswer(key) {
  const boxes = document.querySelectorAll(`[data-qkey-multi="${key}"]`);
  const checkedOpts = Array.from(boxes).filter((b) => b.checked).map((b) => b.value);
  const otherCb = document.querySelector(`[data-qkey-multi-other="${key}"]`);
  const otherInput = document.querySelector(`[data-qkey-other="${key}"]`);
  if (otherCb && otherCb.checked && otherInput && otherInput.value.trim()) {
    checkedOpts.push(otherInput.value.trim());
  }
  state.answers[key] = checkedOpts;
}

// ============ SUBMIT ============
async function submit() {
  const ui = UI[state.lang] || UI.ru;
  const btn = document.getElementById('nextBtn');
  btn.disabled = true;
  btn.textContent = ui.sending;

  if (!state.identity.company_name?.trim() || !state.identity.contact_name?.trim() ||
      !isPhoneValid(state.identity.phone || '')) {
    btn.disabled = false;
    btn.textContent = ui.submit;
    return showError(ui.fillRequired);
  }

  const payload = {
    company_name: state.identity.company_name,
    contact_name: state.identity.contact_name,
    position: state.identity.position,
    phone: state.identity.phone,
    language: state.lang,
    answers: Object.keys(state.answers).map((key) => ({
      question_key: key,
      value: state.answers[key],
    })),
  };

  try {
    const r = await fetch('/api/survey/responses', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Ошибка отправки');
    clearDraft();
    state.cursor = 'thanks';
    render({ scrollTop: true });
  } catch (e) {
    showError(e.message);
    btn.disabled = false;
    btn.textContent = ui.submit;
  }
}

// ============ HELPERS ============
function isPhoneValid(p) {
  const digits = (p || '').replace(/\D/g, '');
  return digits.startsWith('998') && digits.length >= 12;
}
function scrollIntoViewMobile(el) {
  if (window.matchMedia('(max-width: 767px)').matches && el) {
    setTimeout(() => el.scrollIntoView({ block: 'center', behavior: 'smooth' }), 150);
  }
}
function showError(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.className = 'msg error';
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

init();
</script>
</body>
